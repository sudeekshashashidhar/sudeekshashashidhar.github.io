<h2>Play Guess the Number!</h2>
<p>Guess a number between 1 and 10:</p>
<input type="number" id="guess" min="1" max="10">
<button onclick="checkGuess()">Submit</button>
<p id="result"></p>

<script>
    function checkGuess() {
        const randomNumber = Math.floor(Math.random() * 10) + 1; // Generate a random number every time
        const userGuess = document.getElementById("guess").value;
        const result = document.getElementById("result");
        if (userGuess == randomNumber) {
            result.textContent = "You guessed it right! 🎉 The number was " + randomNumber;
        } else {
            result.textContent = "Wrong guess! The number was " + randomNumber;
        }
    }
</script>




<h2>Countdown to Christmas!</h2>
<p id="countdown"></p>
<script>
    const christmas = new Date("December 25, 2024");
    function updateCountdown() {
        const now = new Date();
        const diff = christmas - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById("countdown").textContent = 
            `${days} days, ${hours} hours, ${minutes} minutes, ${seconds} seconds until Christmas! 🎄`;
    }
    setInterval(updateCountdown, 1000);
</script>
